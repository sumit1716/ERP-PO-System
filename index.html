<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP PO Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border: none; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .ai-description { display: block; margin-top: 5px; font-style: italic; color: #0d6efd; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">IV Innovations ERP</a>
        <button id="login-btn" class="btn btn-outline-light">Login with Google</button>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-10 offset-lg-1">
            <div class="card mb-5">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Create New Purchase Order [cite: 17]</h5>
                    <span class="badge bg-light text-dark">Tax: 5% [cite: 14]</span>
                </div>
                <div class="card-body">
                    <form id="po-form">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Vendor [cite: 11]</label>
                                <select id="vendor-select" class="form-select" required></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Reference No [cite: 13]</label>
                                <input type="text" id="ref-no" class="form-control" placeholder="PO-123" required>
                            </div>
                        </div>

                        <h6>Products [cite: 12]</h6>
                        <table class="table" id="product-table">
                            <thead>
                                <tr>
                                    <th style="width: 60%;">Product & AI Desc </th>
                                    <th>Quantity</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="product-row">
                                    <td>
                                        <div class="input-group">
                                            <select class="form-select product-select" required>
                                                <option value="">Select Product</option>
                                            </select>
                                            <button class="btn btn-outline-secondary auto-desc" type="button" title="Generate AI Description">✨</button>
                                        </div>
                                        <small class="text-muted ai-description"></small>
                                    </td>
                                    <td><input type="number" class="form-control quantity" value="1" min="1"></td>
                                    <td><button type="button" class="btn btn-danger btn-sm remove-row">Remove</button></td>
                                </tr>
                            </tbody>
                        </table>
                        
                        <div class="d-flex justify-content-between">
                            <button type="button" class="btn btn-success" id="add-row">+ Add Row [cite: 18]</button>
                            <button type="submit" class="btn btn-primary px-5">Submit PO [cite: 17]</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    const API_URL = "http://127.0.0.1:8000/api";
    let productOptions = "";

    $(document).ready(function() {
        // Load Vendors [cite: 17]
        fetch(`${API_URL}/vendors`).then(res => res.json()).then(data => {
            data.forEach(v => $('#vendor-select').append(`<option value="${v.vendorid}">${v.name}</option>`));
        });

        // Load Products [cite: 17]
        fetch(`${API_URL}/products`).then(res => res.json()).then(data => {
            productOptions = '<option value="">-- Choose --</option>';
            data.forEach(p => productOptions += `<option value="${p.productid}" data-name="${p.name}">${p.name}</option>`);
            $('.product-select').html(productOptions);
        });

        // Add Row [cite: 18, 23]
        $('#add-row').click(function() {
            const row = `<tr class="product-row">
                <td>
                    <div class="input-group">
                        <select class="form-select product-select" required>${productOptions}</select>
                        <button class="btn btn-outline-secondary auto-desc" type="button">✨</button>
                    </div>
                    <small class="text-muted ai-description"></small>
                </td>
                <td><input type="number" class="form-control quantity" value="1" min="1"></td>
                <td><button type="button" class="btn btn-danger btn-sm remove-row">Remove</button></td>
            </tr>`;
            $('#product-table tbody').append(row);
        });

        // AI Description Logic (Requirement 3) [cite: 20, 21, 22]
        $(document).on('click', '.auto-desc', function() {
            const row = $(this).closest('tr');
            const productName = row.find('.product-select option:selected').data('name');
            const descElement = row.find('.ai-description');

            if (!productName) return alert("Please select a product first");

            descElement.text("AI is thinking...");
            fetch(`${API_URL}/ai-description?product_name=${productName}`)
                .then(res => res.json())
                .then(data => descElement.text(data.description))
                .catch(() => descElement.text("Failed to load description."));
        });

        // Submit Logic [cite: 14, 17]
        $('#po-form').on('submit', function(e) {
            e.preventDefault();
            alert("PO Submitted! Backend will calculate 5% tax and save to PostgreSQL. [cite: 10, 14]");
        });
    });
</script>
</body>
</html>
